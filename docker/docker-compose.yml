services:
  nginx:
    image: nginx:alpine
    container_name: fast-nginx
    ports:
      - "8083:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fast-serve
      - minio
    networks:
      - fast-network
    restart: unless-stopped

  fast-serve:
    image: eclipse-temurin:8-jdk
    container_name: fast-serve
    # ports:
    #   - "8100:8100"
    volumes:
      - ./fast-serve.jar:/app/app.jar:ro
      - ./application-prod.yml:/app/config/application-prod.yml:ro
    working_dir: /app
    environment:
      - TZ=Asia/Shanghai
      - SPRING_CONFIG_LOCATION=/app/config/application-prod.yml
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=http://minio:9000
    command: >
      sh -c "java -Xms512m -Xmx1024m -Dspring.profiles.active=prod -Dspring.config.location=/app/config/application-prod.yml -jar app.jar"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - fast-network
    restart: unless-stopped

  postgres:
    image: postgres:14.5
    container_name: fast-postgres
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fast-network
    restart: unless-stopped

  redis:
    image: redis:7.0.4
    container_name: fast-redis
    # ports:
    #   - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fast-network
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: fast-minio
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - fast-network
    restart: unless-stopped

networks:
  fast-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
server:
  port: 8100

spring:
  profiles:
    active: prod
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:fast_frame}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:fast123}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin123
        reset-enable: false
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
        wall:
          enabled: true

  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:fast123}
    database: 6
    timeout: 10000ms
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ROOT_USER:admin}
  secret-key: ${MINIO_ROOT_PASSWORD:fast123456}
  buckets:
    avatar: fast-frame-avatar
    file: fast-frame-file

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.fast.modules.*.domain.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: delFlag
      logic-delete-value: '1'
      logic-not-delete-value: '0'

# Sa-Token 配置
sa-token:
  token-name: sa-token
  token-prefix: Bearer
  timeout: 86400
  active-timeout: 1800
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false
  is-print: false

# Knife4j 配置 (生产环境可关闭)
knife4j:
  enable: true
  setting:
    language: zh_cn

# Warm-Flow 工作流配置
warm-flow:
  enabled: true
  banner: false
  ui: true
  key-type: SnowId19
  logic-delete: true
  logic-delete-value: '1'
  logic-not-delete-value: '0'
  token-name: sa-token
  permission-handler-path: com.fast.modules.flow.handler.FlowPermissionHandler
  data-source-type: postgres
spring:
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          driver-class-name: org.postgresql.Driver
          url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fast_frame}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          username: ${DB_USERNAME:postgres}
          password: ${DB_PASSWORD:root}
          hikari:
            minimum-idle: 5
            maximum-pool-size: 20
            idle-timeout: 600000
            max-lifetime: 1800000
            connection-timeout: 30000
            connection-test-query: SELECT 1
            pool-name: HikariPool-Master
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:root}
    database: ${REDIS_DATABASE:6}
    timeout: 10000ms
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123}
  buckets:
    avatar: fast-frame-avatar
    file: fast-frame-file

# 短信配置
sms:
  enabled: true
  provider: mock
  sign-name: FastFrame
  template-code: SMS_123456
  # 阿里云短信配置
  access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
  access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
  # 腾讯云短信配置
  secret-id: ${TENCENT_SECRET_ID:}
  secret-key: ${TENCENT_SECRET_KEY:}
  app-id: ${TENCENT_SMS_APP_ID:}
server:
  port: 8080

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.fast.modules.*.domain.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: delFlag
      logic-delete-value: '1'
      logic-not-delete-value: '0'

# Sa-Token 配置
sa-token:
  token-name: sa-token
  token-prefix: Bearer
  timeout: 86400
  active-timeout: 1800
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false
  is-print: false

# 日志配置
logging:
  level:
    com.fast: debug
    org.springframework: warn

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
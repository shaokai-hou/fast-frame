server:
  port: 8100

spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:com/fast/modules/**/mapper/*.xml
  type-aliases-package: com.fast.modules.*.domain.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: delFlag
      logic-delete-value: '1'
      logic-not-delete-value: '0'

# Sa-Token 配置
sa-token:
  token-name: sa-token
  token-prefix: Bearer
  timeout: 86400
  active-timeout: 1800
  # 禁止并发登录：同一账号新登录会自动踢掉旧登录，旧会话收到"已被踢下线"提示
  is-concurrent: false
  # 每次登录生成新 token，不共用
  is-share: false
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false
  is-print: false

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# Warm-Flow 工作流配置
warm-flow:
  enabled: true
  banner: false
  ui: true
  key-type: SnowId19
  # Warm-Flow 自带的逻辑删除（与 MyBatis-Plus 独立）
  logic-delete: true
  logic-delete-value: '1'
  logic-not-delete-value: '0'
  # 共享业务系统权限，与 Sa-Token 使用相同的 token name
  token-name: sa-token
  # 办理人权限处理器路径
  permission-handler-path: com.fast.modules.flow.handler.FlowPermissionHandler
  # 数据源类型
  data-source-type: postgres

# Captcha-Plus 滑块验证码配置
aj:
  captcha:
    # 水印内容，设置为空去除右下角水印
    water-mark: 'fast-frame'
    # 验证码类型：blockpuzzle 滑块拼图
    type: blockpuzzle